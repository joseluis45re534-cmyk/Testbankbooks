<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="NursTestBank">
  <title>NursTestBank — Digital Study Materials for Nursing Students</title>
  <!-- Mark: stylized open book with a medical cross -->
  <g transform="translate(6 8)">
    <rect x="0" y="0" width="48" height="48" rx="10" fill="#0d9488"/>
    <!-- Open book pages -->
    <path d="M10 14 L24 18 L24 40 L10 36 Z" fill="#ffffff" opacity="0.95"/>
    <path d="M38 14 L24 18 L24 40 L38 36 Z" fill="#ffffff" opacity="0.85"/>
    <!-- Spine -->
    <line x1="24" y1="18" x2="24" y2="40" stroke="#0f766e" stroke-width="1.5"/>
    <!-- Medical cross overlay -->
    <g transform="translate(24 28)" fill="#dc2626">
      <rect x="-2.5" y="-7" width="5" height="14" rx="1"/>
      <rect x="-7" y="-2.5" width="14" height="5" rx="1"/>
    </g>
  </g>
  <!-- Wordmark -->
  <g transform="translate(66 0)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <text x="0" y="32" font-size="24" font-weight="700" fill="#0f172a" letter-spacing="-0.3">
      Nurs<tspan fill="#0d9488">Test</tspan>Bank
    </text>
    <text x="0" y="50" font-size="10" font-weight="500" fill="#64748b" letter-spacing="0.8">
      DIGITAL STUDY MATERIALS
    </text>
  </g>
</svg>
